name: search_reader
description: "本地小说阅读器（txt，未来扩展 epub）"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 本地数据库：全平台统一 ffi 后端
  sqflite_common_ffi: ^2.4.0+3
  # SQLite 原生实现：v3 经 build hooks 自带含 FTS5 的 SQLite，无需系统库或额外原生包
  sqlite3: ^3.3.1

  # 跨平台文件选择 + 沙盒路径
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  path: ^1.9.0

  # 字符编码转换（GBK / GB18030 等中文编码）
  enough_convert: ^1.6.0

  # 生成文件 UUID（导入时给文件起唯一名）
  uuid: ^4.5.1

  # epub 解析（导入时把 epub 章节抽成纯文本）
  epubx: ^4.0.0
  # HTML → 纯文本（epub 章节内容是 XHTML 片段）
  html: ^0.15.6
  # zip 打包：处理"解压目录形式的 epub"，现场打回 zip 喂给 epubx
  archive: ^3.6.0
  flex_color_scheme: ^8.4.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
