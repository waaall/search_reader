name: search_reader
description: "本地小说阅读器（txt，未来扩展 epub）"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 本地数据库（移动端）+ 桌面端 ffi 后端
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4

  # 跨平台文件选择 + 沙盒路径
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  path: ^1.9.0

  # 字符编码转换（GBK / GB18030 等中文编码）
  enough_convert: ^1.6.0

  # 生成文件 UUID（导入时给文件起唯一名）
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
